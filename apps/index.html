<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人 App · WK1995</title>
  <meta name="description" content="WK1995 的个人 App 列表和安装包下载二维码。">
  <link rel="stylesheet" href="../assets/site.css">
  <link rel="stylesheet" href="../assets/catalog-pages.css">
</head>
<body data-page="personalAppsPage">
  <nav class="catalog-topbar">
    <a class="catalog-brand" href="/" aria-label="返回首页">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M2 2.75A1.75 1.75 0 0 1 3.75 1h8.5A1.75 1.75 0 0 1 14 2.75v10.5A1.75 1.75 0 0 1 12.25 15h-8.5A1.75 1.75 0 0 1 2 13.25V2.75Zm1.5 0v10.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25V2.75a.25.25 0 0 0-.25-.25h-8.5a.25.25 0 0 0-.25.25ZM6 11.75A.75.75 0 0 1 6.75 11h2.5a.75.75 0 0 1 0 1.5h-2.5A.75.75 0 0 1 6 11.75Z"></path>
      </svg>
      <span>WK Apps</span>
    </a>
    <div class="catalog-topbar-actions">
      <label class="control-group">
        <span class="control-label" id="language-label" data-i18n="controls.language">语言</span>
        <select class="language-select" id="language-select" aria-label="语言">
          <option value="zh">简体中文</option>
          <option value="en">English</option>
        </select>
      </label>
      <div class="control-group">
        <span class="control-label" id="theme-caption" data-i18n="controls.theme">主题</span>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换主题">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path id="theme-icon" d="M9.598 1.591a.75.75 0 0 1 .287.857 6.998 6.998 0 0 0 8.442 8.442.75.75 0 0 1 .857.287.75.75 0 0 1-.131.94A8.5 8.5 0 1 1 8.658.722a.75.75 0 0 1 .94-.131Z"></path>
          </svg>
          <span id="theme-label" data-i18n="controls.theme.dark">暗色</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="catalog-shell">
    <header class="catalog-page-head">
      <div>
        <p class="catalog-kicker" data-app-text="eyebrow">Personal Apps</p>
        <h1 data-app-text="title">个人 App 列表</h1>
        <p data-app-text="intro">workflow 生成的安装包按平台放入 apps/packages，页面会自动按 Android、iOS、Harmony、Windows、macOS 等平台生成下载入口和二维码。</p>
      </div>
      <a class="catalog-primary-link" href="packages/" data-app-text="packageDir">安装包目录</a>
    </header>

    <section class="catalog-toolbar" aria-label="App 筛选">
      <label class="catalog-search">
        <span data-app-text="searchLabel">搜索 App</span>
        <input id="app-search" type="search" autocomplete="off" placeholder="App 名称 / 平台 / 版本">
      </label>
      <div class="catalog-current" id="app-source"></div>
    </section>

    <nav class="catalog-platforms" id="app-platforms" aria-label="平台分类"></nav>

    <section class="catalog-section">
      <div class="catalog-section-head">
        <h2 data-app-text="listTitle">App 安装包</h2>
        <span id="app-count">0</span>
      </div>
      <div class="app-platform-groups" id="app-groups"></div>
    </section>

    <div class="catalog-status" id="app-status" role="status" aria-live="polite"></div>
  </main>

  <script src="../assets/site.js"></script>
  <script src="../assets/personal-apps.js"></script>
</body>
</html>
