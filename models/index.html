<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大模型列表 · WK1995</title>
  <meta name="description" content="选择用于 WK AI Chat 的大模型。">
  <link rel="stylesheet" href="../assets/site.css">
  <link rel="stylesheet" href="../assets/catalog-pages.css">
</head>
<body data-page="modelCatalogPage">
  <nav class="catalog-topbar">
    <a class="catalog-brand" href="/" aria-label="返回首页">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0 1.4 3.2v5.2c0 3.2 2.7 6.2 6.6 7.6 3.9-1.4 6.6-4.4 6.6-7.6V3.2L8 0Zm0 1.7 5.1 2.5v4.2c0 2.3-1.9 4.7-5.1 5.9-3.2-1.2-5.1-3.6-5.1-5.9V4.2L8 1.7Z"></path>
      </svg>
      <span>WK AI</span>
    </a>
    <div class="catalog-topbar-actions">
      <label class="control-group">
        <span class="control-label" id="language-label" data-i18n="controls.language">语言</span>
        <select class="language-select" id="language-select" aria-label="语言">
          <option value="zh">简体中文</option>
          <option value="en">English</option>
        </select>
      </label>
      <div class="control-group">
        <span class="control-label" id="theme-caption" data-i18n="controls.theme">主题</span>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换主题">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path id="theme-icon" d="M9.598 1.591a.75.75 0 0 1 .287.857 6.998 6.998 0 0 0 8.442 8.442.75.75 0 0 1 .857.287.75.75 0 0 1-.131.94A8.5 8.5 0 1 1 8.658.722a.75.75 0 0 1 .94-.131Z"></path>
          </svg>
          <span id="theme-label" data-i18n="controls.theme.dark">暗色</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="catalog-shell model-workbench-shell">
    <header class="catalog-page-head model-workbench-head">
      <div>
        <p class="catalog-kicker" data-model-text="eyebrow">Model Catalog</p>
        <h1 data-model-text="title">模型选择工作台</h1>
        <p data-model-text="intro">按运行位置、能力和密钥状态筛选模型，选择后会写入 Chat 的本地配置。</p>
      </div>
      <div class="model-current-panel">
        <a class="catalog-primary-link" href="../chat/" data-model-text="chatAction">进入 Chat</a>
        <div class="catalog-current" id="model-current"></div>
      </div>
    </header>

    <section class="model-bench-stats" id="model-stats" aria-label="模型概览"></section>

    <section class="catalog-toolbar model-toolbar" aria-label="模型筛选">
      <label class="catalog-search">
        <span data-model-text="searchLabel">搜索模型</span>
        <input id="model-search" type="search" autocomplete="off" placeholder="DeepSeek / GLM / 本地">
      </label>
      <fieldset class="model-filter-group">
        <legend data-model-text="deploymentFilter">运行位置</legend>
        <div class="model-segmented" id="model-deployment-filter">
          <button type="button" data-model-deployment="all" aria-pressed="true" data-model-text="filterAll">全部</button>
          <button type="button" data-model-deployment="cloud" aria-pressed="false" data-model-text="cloud">云端</button>
          <button type="button" data-model-deployment="offline" aria-pressed="false" data-model-text="offline">离线</button>
        </div>
      </fieldset>
      <fieldset class="model-filter-group">
        <legend data-model-text="capabilityFilter">能力</legend>
        <div class="model-segmented" id="model-capability-filter">
          <button type="button" data-model-capability="all" aria-pressed="true" data-model-text="filterAll">全部</button>
          <button type="button" data-model-capability="reasoning" aria-pressed="false" data-model-text="reasoning">推理</button>
          <button type="button" data-model-capability="vision" aria-pressed="false" data-model-text="vision">视觉</button>
          <button type="button" data-model-capability="text" aria-pressed="false" data-model-text="textOnly">文本</button>
        </div>
      </fieldset>
    </section>

    <section class="catalog-section">
      <div class="catalog-section-head">
        <h2 data-model-text="builtInTitle">内置大模型</h2>
        <span id="model-count">0</span>
      </div>
      <div class="model-grid" id="model-grid"></div>
    </section>

    <section class="catalog-section" id="custom-model-section" hidden>
      <div class="catalog-section-head">
        <h2 data-model-text="customTitle">自定义模型</h2>
        <span id="custom-model-count">0</span>
      </div>
      <div class="model-grid" id="custom-model-grid"></div>
    </section>

    <div class="catalog-status" id="model-status" role="status" aria-live="polite"></div>
  </main>

  <script src="../assets/site.js"></script>
  <script src="../assets/model-catalog.js"></script>
  <script src="../assets/model-list.js"></script>
</body>
</html>
