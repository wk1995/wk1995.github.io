<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Packages · WK1995</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f4f7fb;
      color: #172033;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;

    main {
      width: min(640px, 100%);
      display: grid;
      gap: 14px;
      padding: 24px;

      border-radius: 8px;
      background: #ffffff;
    }

    h1,
    p {
      margin: 0;
    }

    p {
      color: #647187;
    }

    a {
      color: #256f79;
      font-weight: 700;
    }
  </style>

<body>
  <main>
    <h1>App Packages</h1>
    <p>workflow 生成的安装包按 <code>平台名/包名</code> 或 <code>平台名/包名/版本</code> 放置，并由 <a href="manifest.json">manifest.json</a> 登记到个人 App 列表页。</p>
    <p>包目录中的 README 会作为 App 详情页的项目介绍；Android 目录只识别 apk 与 aab 安装包。</p>
    <p><a href="../">返回个人 App 列表</a></p>
