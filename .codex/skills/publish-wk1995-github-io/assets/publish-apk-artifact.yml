name: Publish APK Artifact

on:
  workflow_run:
    workflows:
      - Build Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Build Release run ID. Leave empty to use the latest successful run with an APK artifact.
        required: false
        type: string

permissions:
  actions: read
  contents: read

jobs:
  publish-apk-artifact:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 0

      - name: Resolve APK artifact
        id: artifact
        working-directory: source
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id || '' }}
        run: |
          set -euo pipefail

          artifact_root="$GITHUB_WORKSPACE/apk-artifacts"
          mkdir -p "$artifact_root"

          run_ids=()
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            run_ids=("$WORKFLOW_RUN_ID")
          elif [ -n "$INPUT_RUN_ID" ]; then
            run_ids=("$INPUT_RUN_ID")
          else
            mapfile -t run_ids < <(gh api \
              "repos/$SOURCE_REPOSITORY/actions/workflows/release.yml/runs?status=success&branch=master&per_page=10" \
              --jq '.workflow_runs[].id')
          fi

          if [ "${#run_ids[@]}" -eq 0 ] || [ -z "${run_ids[0]}" ]; then
            echo "No Build Release runs found."
            echo "has_artifact=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          selected_run_id=""
          selected_artifacts=()
          for run_id in "${run_ids[@]}"; do
            [ -n "$run_id" ] || continue
            mapfile -t artifact_names < <(gh api \
              "repos/$SOURCE_REPOSITORY/actions/runs/$run_id/artifacts" \
              --jq '.artifacts[] | select(.expired == false and (.name | startswith("bodyos-"))) | .name')

            if [ "${#artifact_names[@]}" -eq 0 ]; then
              echo "Run $run_id has no non-expired bodyos-* APK artifact."
              continue
            fi

            selected_run_id="$run_id"
            selected_artifacts=("${artifact_names[@]}")
            break
          done

          if [ -z "$selected_run_id" ]; then
            echo "No APK artifact found; publish step will end without changes."
            echo "has_artifact=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for artifact_name in "${selected_artifacts[@]}"; do
            echo "Downloading artifact $artifact_name from run $selected_run_id"
            gh run download "$selected_run_id" \
              --repo "$SOURCE_REPOSITORY" \
              --name "$artifact_name" \
              --dir "$artifact_root/$artifact_name"
          done

          apk_count="$(find "$artifact_root" -type f -name '*.apk' | wc -l | tr -d ' ')"
          if [ "$apk_count" = "0" ]; then
            echo "APK artifact exists but contains no .apk files; publish step will end without changes."
            echo "has_artifact=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $apk_count APK file(s) in release artifacts."
          echo "has_artifact=true" >> "$GITHUB_OUTPUT"
          echo "source_run_id=$selected_run_id" >> "$GITHUB_OUTPUT"

      - name: Check target repository token
        if: steps.artifact.outputs.has_artifact == 'true'
        env:
          TARGET_REPO_TOKEN: ${{ secrets.PUBLISH_APP_FROM_BODYOS_TO_GITHUB_IO }}
        run: |
          set -euo pipefail
          if [ -z "$TARGET_REPO_TOKEN" ]; then
            echo "Missing secret PUBLISH_APP_FROM_BODYOS_TO_GITHUB_IO. It must be a fine-grained token with Contents: Read and write on wk1995/wk1995.github.io." >&2
            exit 1
          fi

      - name: Checkout target repository
        if: steps.artifact.outputs.has_artifact == 'true'
        uses: actions/checkout@v4
        with:
          repository: wk1995/wk1995.github.io
          token: ${{ secrets.PUBLISH_APP_FROM_BODYOS_TO_GITHUB_IO }}
          path: target-site

      - name: Copy Android package files
        if: steps.artifact.outputs.has_artifact == 'true'
        id: package
        run: |
          set -euo pipefail

          package_name="$(python - <<'PY'
          import pathlib
          import re
          import sys

          build_file = pathlib.Path("source/app/build.gradle.kts")
          text = build_file.read_text(encoding="utf-8")
          match = re.search(r'applicationId\s*=\s*"([^"]+)"', text)
          if not match:
              print("applicationId not found in source/app/build.gradle.kts", file=sys.stderr)
              raise SystemExit(1)
          print(match.group(1))
          PY
          )"

          app_version="$(python - <<'PY'
          import pathlib
          import sys

          properties = {}
          for line in pathlib.Path("source/version.properties").read_text(encoding="utf-8").splitlines():
              stripped = line.strip()
              if not stripped or stripped.startswith("#") or "=" not in stripped:
                  continue
              key, value = stripped.split("=", 1)
              properties[key.strip()] = value.strip()

          version_code = properties.get("versionCode")
          version_name = properties.get("versionName")
          if not version_code or not version_name:
              print("versionCode/versionName not found in source/version.properties", file=sys.stderr)
              raise SystemExit(1)

          print(f"{version_code}({version_name})")
          PY
          )"

          target_dir="$GITHUB_WORKSPACE/target-site/apps/packages/android/$package_name/$app_version"
          target_path="apps/packages/android/$package_name/$app_version"

          if [ ! -d "$target_dir" ]; then
            echo "Target publish directory does not exist: $target_path" >&2
            echo "Create this directory in wk1995/wk1995.github.io before running the publish workflow." >&2
            exit 1
          fi

          find "$GITHUB_WORKSPACE/apk-artifacts" -type f -name '*.apk' -print0 |
            while IFS= read -r -d '' apk_file; do
              echo "Copying $(basename "$apk_file") to $target_dir"
              cp "$apk_file" "$target_dir/"
            done

          readme_file="$(find "$GITHUB_WORKSPACE/source" -maxdepth 1 -type f -iname 'README*' | head -n 1 || true)"
          if [ -n "$readme_file" ]; then
            readme_target="$target_dir/$(basename "$readme_file")"
            echo "Copying source README to $readme_target"
            cp "$readme_file" "$readme_target"
          else
            echo "No README file found in source branch; skipped README copy."
          fi

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "target_path=$target_path" >> "$GITHUB_OUTPUT"

      - name: Commit and push package files
        if: steps.artifact.outputs.has_artifact == 'true'
        working-directory: target-site
        env:
          TARGET_PATH: ${{ steps.package.outputs.target_path }}
          SOURCE_RUN_ID: ${{ steps.artifact.outputs.source_run_id }}
        run: |
          set -euo pipefail

          git config user.name "github-publish-actions[bot]"
          git config user.email "41898282+github-publish-actions[bot]@users.noreply.github.com"

          git add "$TARGET_PATH"

          if git diff --cached --quiet; then
            echo "No package file changes to commit."
            exit 0
          fi

          git commit -m "[codex] publish BodyOS Android APK from run $SOURCE_RUN_ID"
          git push
