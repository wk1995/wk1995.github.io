<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>博客 · WK · AI x Android</title>
  <meta name="description" content="WK1995 的博客，记录 AI、Android、自动化和个人技术写作。">
  <link rel="stylesheet" href="../assets/site.css">
  <link rel="stylesheet" href="../assets/blog.css">
</head>
<body data-page="blogIndex">
  <div class="blog-shell">
    <header class="blog-hero">
      <div class="site-topbar">
        <a
          class="brand-link"
          href="https://github.com/wk1995"
          target="_blank"
          rel="noopener"
          data-i18n-aria="brand.aria"
          aria-label="打开 WK1995 的 GitHub 主页"
        >
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.1 0 0 .67-.21 2.2.82a7.56 7.56 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.09.16 1.9.08 2.1.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
          </svg>
        </a>
        <div class="topbar-right">
          <div class="control-row">
            <a class="github-auth-button github-auth-button-secondary" href="https://github.com/wk1995/wk1995.github.io/issues/new" data-feedback-entry>反馈</a>
            <label class="control-group" for="language-select">
              <span class="control-label" id="language-label" data-i18n="controls.language">语言</span>
              <select class="language-select" id="language-select" aria-label="语言">
                <option value="zh">简体中文</option>
                <option value="en">English</option>
              </select>
            </label>
            <div class="control-group">
              <span class="control-label" id="theme-caption" data-i18n="controls.theme">主题</span>
              <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换主题">
                <svg viewBox="0 0 16 16" aria-hidden="true">
                  <path id="theme-icon" d="M9.598 1.591a.75.75 0 0 1 .287.857 6.998 6.998 0 0 0 8.442 8.442.75.75 0 0 1 .857.287.75.75 0 0 1-.131.94A8.5 8.5 0 1 1 8.658.722a.75.75 0 0 1 .94-.131Z"></path>
                </svg>
                <span id="theme-label" data-i18n="controls.theme.dark">暗色</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <a class="blog-back" href="../index.html" data-i18n="back.home">← 返回主页</a>
      <span class="blog-kicker" data-i18n="blog.kicker">Writing System</span>
      <h1 data-i18n="header.title">博客</h1>
      <p data-i18n="header.intro">
        用 Markdown 记录技术、产品和 AI 自动化实验。这里的文章支持标签筛选、关键词搜索和多平台发布状态。
      </p>
    </header>

    <main>
      <section class="blog-toolbar" aria-label="博客筛选">
        <div class="blog-search-field">
          <label for="blog-search" data-i18n="blog.search.label">搜索文章</label>
          <input id="blog-search" type="search" placeholder="搜索标题、标签、摘要或正文关键词" autocomplete="off" data-blog-search data-i18n-placeholder="blog.search.placeholder">
        </div>
        <div class="blog-count" data-blog-count data-i18n="blog.loading">加载中</div>
      </section>

      <section class="blog-filter-row" aria-label="标签筛选" data-blog-tags></section>
      <section class="blog-list" aria-live="polite" data-blog-list>
        <div class="blog-empty" data-i18n="blog.loadingIndex">正在加载文章索引...</div>
      </section>
    </main>
  </div>
  <footer class="blog-footer">
    <p data-i18n-html="footer.html">
      欢迎通过 <a href="mailto:kangw1995@gmail.com">kangw1995@gmail.com</a> 交流更多想法。
    </p>
  </footer>
  <script src="../assets/site.js"></script>
  <script src="../assets/feedback-entry.js"></script>
  <script src="../assets/chat-link.js"></script>
  <script src="../assets/blog.js"></script>
</body>
</html>
