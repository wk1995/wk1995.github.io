  <style>
    :root {
      --bg: #0b1018;
      --bg-glow: #182034;
      --fg: #f2f5ff;
      --fg-muted: #a6afc5;
      --primary: #6c63ff;
      --accent: #1e90ff;
      --border: rgba(255, 255, 255, 0.08);
      --card-bg: rgba(18, 24, 36, 0.85);
      --control-bg: rgba(15, 22, 33, 0.72);
      --control-border: rgba(255, 255, 255, 0.08);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    html[data-theme="light"] {
      --bg: #eff4ff;
      --bg-glow: #d6e4ff;
      --fg: #162033;
      --fg-muted: #5a6880;
      --primary: #245fdd;
      --accent: #1177ee;
      --border: rgba(15, 23, 42, 0.1);
      --card-bg: rgba(255, 255, 255, 0.84);
      --control-bg: rgba(255, 255, 255, 0.82);
      --control-border: rgba(15, 23, 42, 0.12);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, var(--bg-glow), var(--bg) 60%);
      color: var(--fg);
      line-height: 1.6;
    }

    a {
      color: inherit;
    }

    .container {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    header {
      padding: 2rem 0 1rem;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 1.5rem;
    }

    .back:hover,
    .back:focus {
      color: var(--fg);
    }

    h1 {
      margin: 1.5rem 0 0.5rem;
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    .intro {
      max-width: 680px;
      color: var(--fg-muted);
    }

    main {
      margin-top: 3rem;
    }

    .post-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.75rem;
      margin-bottom: 1.75rem;
      transition: transform 0.2s ease, border-color 0.2s ease;
      backdrop-filter: blur(12px);
    }

    .post-card:hover,
    .post-card:focus-within {
      transform: translateY(-3px);
      border-color: rgba(108, 99, 255, 0.5);
    }

    .post-card time {
      display: block;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin-bottom: 0.75rem;
    }

    .post-card h2 {
      margin: 0 0 0.75rem;
      font-size: 1.6rem;
    }

    .post-card p {
      margin: 0 0 1.25rem;
      color: var(--fg-muted);
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      background: rgba(108, 99, 255, 0.18);
      color: var(--fg);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-right: 0.5rem;
    }

    footer {
      padding: 3rem 0 2rem;
      text-align: center;
      color: var(--fg-muted);
      font-size: 0.9rem;
    }

    footer a {
      color: var(--fg);
      text-decoration: none;
    }

    @media (max-width: 720px) {
      .post-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
