<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Auth Callback</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
      font: 16px/1.5 "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 420px);
      padding: 1.5rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 18px 48px rgba(2, 6, 23, 0.42);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.2rem;
    }

    p {
      margin: 0;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <main>
    <h1>GitHub login</h1>
    <p id="callback-status">Completing authorization...</p>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var payload = {
        source: "wk1995-github-auth-callback",
        code: params.get("code") || "",
        state: params.get("state") || "",
        error: params.get("error") || "",
        error_description: params.get("error_description") || ""
      };
      var status = document.getElementById("callback-status");

      if (window.opener && window.opener !== window) {
        window.opener.postMessage(payload, window.location.origin);
        status.textContent = payload.error ? "Authorization failed. You can close this window." : "Authorization completed. You can close this window.";
        window.setTimeout(function () {
          window.close();
        }, 500);
      } else {
        status.textContent = "Return to the original tab to continue.";
      }
    })();
  </script>
</body>
</html>
