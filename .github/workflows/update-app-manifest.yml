name: Update App Manifest

on:
  push:
    paths:
      - "apps/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: app-manifest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate app manifest
        run: python scripts/generate_app_manifest.py

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/packages/manifest.json
          if git diff --cached --quiet; then
            echo "No app manifest changes to commit."
            exit 0
          fi
          git commit -m "【codex】更新 App manifest"
          git push origin HEAD:${GITHUB_REF_NAME}
